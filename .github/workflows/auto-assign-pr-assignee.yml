name: auto-assign-to-author
on:
    pull_request_target:
        types: 
          - opened
          - ready_for_review
          - synchronize
          - reopened
    workflow_dispatch:

permissions:
    pull-requests: write

jobs:
    auto-assign-to-author:
        runs-on: ubuntu-latest
        container: node:20
        steps:
            - uses: actions/checkout@v4
              with:
                sparse-checkout: |
                    .github/workflows/src
            - run: npm install @actions/core
            - run: |
                for assignee in ${{ github.event.pull_request.assignees }}; do
                    echo "Assignee: $assignee.login"
                done
            - run: npm install @actions/github
            - run: node .github/workflows/src/index.js ${{ github.token }}